<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적서 관리 — TECH TRADE CO., LTD.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f7f6;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --info-bg:#e8f0fe;--info-text:#1a56db;
  --danger-text:#c0392b;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f5f5f5;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.22);
  --info-bg:#1a2a4a;--info-text:#7aadff;
  --danger-text:#ff6b6b;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;}

/* Layout */
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem;}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
header h1{font-size:16px;font-weight:600;letter-spacing:-.01em;}
header span{font-size:12px;color:var(--text2);}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.tab{padding:9px 18px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600;}
.sec{display:none;}.sec.active{display:block;}

/* Cards */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.125rem 1.25rem;margin-bottom:.875rem;}
.card-title{font-size:10px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.875rem;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1rem;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px;}
.stat-value{font-size:20px;font-weight:600;}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr;}}

/* Forms */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:11px;color:var(--text2);font-weight:500;}
input,select,textarea{
  padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);
  font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;width:100%;
  transition:border-color .12s;
}
input:focus,select:focus{outline:none;border-color:#666;box-shadow:0 0 0 3px rgba(0,0,0,.06);}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
.tbl th{text-align:left;padding:6px 8px;font-size:10px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.03em;text-transform:uppercase;}
.tbl td{padding:5px 6px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
.tbl td input{padding:4px 6px;font-size:12px;}
.tbl th:nth-child(1),.tbl td:nth-child(1){width:30px;text-align:center;color:var(--text3);}
.tbl th:nth-child(2),.tbl td:nth-child(2){width:110px;}
.tbl th:nth-child(3),.tbl td:nth-child(3){width:auto;}
.tbl th:nth-child(4),.tbl td:nth-child(4){width:62px;}
.tbl th:nth-child(5),.tbl td:nth-child(5){width:90px;}
.tbl th:nth-child(6),.tbl td:nth-child(6){width:90px;text-align:right;font-weight:600;}
.tbl th:nth-child(7),.tbl td:nth-child(7){width:30px;text-align:center;}
.tbl-wrap{overflow-x:auto;}

/* Buttons */
.btn{padding:7px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text);font-family:inherit;transition:background .1s;}
.btn:hover{background:var(--bg2);}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn-primary:hover{opacity:.82;background:var(--text);}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-icon{padding:3px 7px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text2);}
.btn-icon:hover{color:var(--danger-text);}

/* Totals */
.totals{display:flex;justify-content:flex-end;flex-wrap:wrap;gap:1rem 1.5rem;margin-top:.875rem;font-size:13px;align-items:baseline;}
.totals .big{font-size:15px;font-weight:600;}
.row-btn{display:flex;justify-content:space-between;align-items:center;margin-top:.875rem;flex-wrap:wrap;gap:.5rem;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:.5rem;}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.filters input,.filters select{flex:1;min-width:110px;max-width:200px;width:auto;}

/* Quote cards */
.qcard{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1.25rem;background:var(--bg);margin-bottom:7px;cursor:pointer;transition:box-shadow .12s,border-color .12s;}
.qcard:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.qhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.qdocno{font-size:11px;color:var(--text2);font-family:monospace;}
.qcompany{font-size:14px;font-weight:600;}
.qeur{font-size:14px;font-weight:600;}
.qkrw{font-size:11px;color:var(--text2);}
.qmeta{display:flex;gap:10px;font-size:11px;color:var(--text2);margin-top:5px;align-items:center;flex-wrap:wrap;}
.badge{display:inline-block;padding:2px 7px;border-radius:var(--radius);font-size:10px;background:var(--info-bg);color:var(--info-text);font-weight:500;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);padding:1.375rem;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.mtitle{font-size:15px;font-weight:600;}
.minfo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.mi label{font-size:10px;color:var(--text2);display:block;margin-bottom:2px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.mi span{font-size:13px;font-weight:500;}
.msummary{display:flex;flex-direction:column;align-items:flex-end;gap:3px;font-size:12px;margin-top:.875rem;}
.msummary .mbig{font-size:16px;font-weight:700;margin-top:4px;}
.sep{border:none;border-top:0.5px solid var(--border);margin:.75rem 0;}
.mnote{margin-top:.75rem;padding:.75rem;background:var(--bg2);border-radius:var(--radius);font-size:12px;color:var(--text2);}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.625rem 1rem;border-radius:var(--radius);font-size:13px;z-index:300;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>견적서 관리 · TECH TRADE CO., LTD.</h1>
    <span id="save-info">데이터는 이 브라우저에 자동 저장됩니다</span>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="goTab('list')">견적서 목록</button>
    <button class="tab" onclick="goTab('new')">+ 새 견적서</button>
  </div>

  <!-- 목록 탭 -->
  <div id="tab-list" class="sec active">
    <div class="stats" id="stats"></div>
    <div class="filters">
      <input type="text" id="s-search" placeholder="고객사 또는 문서번호 검색" oninput="render()">
      <select id="s-company" onchange="render()"><option value="">전체 고객사</option></select>
      <input type="month" id="s-month" onchange="render()" title="월별 필터">
      <button class="btn btn-sm" onclick="exportCSV()">엑셀 내보내기 ↓</button>
    </div>
    <div id="list"></div>
  </div>

  <!-- 입력 탭 -->
  <div id="tab-new" class="sec">
    <div class="card">
      <div class="card-title">기본 정보</div>
      <div class="grid3" style="margin-bottom:10px;">
        <div class="fg"><label>문서번호 *</label><input id="n-docno" placeholder="OFR12345"></div>
        <div class="fg"><label>발행일 *</label><input type="date" id="n-date"></div>
        <div class="fg"><label>환율 (원/EUR)</label><input type="number" id="n-rate" value="1500.65" step="0.01" oninput="recalc()"></div>
      </div>
      <div class="grid2" style="margin-bottom:10px;">
        <div class="fg"><label>고객사명 *</label><input id="n-company" placeholder="예: 대정"></div>
        <div class="fg"><label>전화</label><input id="n-tel" placeholder="053 304 2511"></div>
      </div>
      <div class="grid2">
        <div class="fg"><label>주소</label><input id="n-addr" placeholder="부산광역시 사상구 낙동대로 1420"></div>
        <div class="fg"><label>팩스</label><input id="n-fax" placeholder="-"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">품목 내역</div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>NO</th><th>코드</th><th>품명</th><th>수량</th><th>단가(EUR)</th><th>합계(EUR)</th><th></th></tr></thead>
          <tbody id="items"></tbody>
        </table>
      </div>
      <div class="row-btn">
        <button class="btn btn-sm" onclick="addRow()">+ 품목 추가</button>
        <div class="totals">
          <span>품목 소계: <strong id="t-sub">€0.00</strong></span>
          <span>운임/보험: <strong id="t-extra">€0.00</strong></span>
          <span class="big">EUR 합계: <strong id="t-eur">€0.00</strong></span>
          <span class="big">원화 합계: <strong id="t-krw">₩0</strong></span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">추가 비용 및 메모</div>
      <div class="grid3">
        <div class="fg"><label>운송비 (EUR)</label><input type="number" id="n-freight" value="0" step="0.01" oninput="recalc()"></div>
        <div class="fg"><label>보험료 (EUR)</label><input type="number" id="n-insurance" value="0" step="0.01" oninput="recalc()"></div>
        <div class="fg"><label>입금계좌 / 기타 메모</label><input id="n-note" placeholder="우리은행 230-289151-13-001 / ㈜테크트레이드"></div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn" onclick="resetForm()">초기화</button>
      <button class="btn btn-primary" onclick="save()">저장</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div id="overlay" style="display:none;" onclick="closeOverlay(event)">
  <div class="modal" id="modal"></div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const KEY='ttc_quotes_v1';
let quotes=[];
let rows=[];

function init(){
  try{const d=localStorage.getItem(KEY);if(d)quotes=JSON.parse(d);}catch(e){}
  renderAll();
  resetForm();
  setToday();
}

function persist(){
  try{localStorage.setItem(KEY,JSON.stringify(quotes));}catch(e){}
  const el=document.getElementById('save-info');
  el.textContent='마지막 저장: '+new Date().toLocaleString('ko-KR');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function setToday(){
  const el=document.getElementById('n-date');
  if(!el.value)el.value=new Date().toISOString().split('T')[0];
}

function goTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['list','new'][i]===t));
  document.querySelectorAll('.sec').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='new')setToday();
}

function addRow(code='',name='',qty=1,unit=0){
  rows.push({code,name,qty,unit});renderRows();
}
function removeRow(i){if(rows.length===1)return;rows.splice(i,1);renderRows();}

function renderRows(){
  document.getElementById('items').innerHTML=rows.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td><input type="text" value="${x(r.code)}" oninput="rows[${i}].code=this.value"></td>
      <td><input type="text" value="${x(r.name)}" oninput="rows[${i}].name=this.value"></td>
      <td><input type="number" value="${r.qty}" min="1" oninput="rows[${i}].qty=+this.value;recalc()"></td>
      <td><input type="number" value="${r.unit}" min="0" step="0.01" oninput="rows[${i}].unit=+this.value;recalc()"></td>
      <td>€${(r.qty*r.unit).toFixed(2)}</td>
      <td><button class="btn-icon" onclick="removeRow(${i})" title="삭제">✕</button></td>
    </tr>`).join('');
  recalc();
}

function recalc(){
  const sub=rows.reduce((s,r)=>s+r.qty*r.unit,0);
  const fr=+document.getElementById('n-freight').value||0;
  const ins=+document.getElementById('n-insurance').value||0;
  const total=sub+fr+ins;
  const rate=+document.getElementById('n-rate').value||1500.65;
  document.getElementById('t-sub').textContent='€'+sub.toFixed(2);
  document.getElementById('t-extra').textContent='€'+(fr+ins).toFixed(2);
  document.getElementById('t-eur').textContent='€'+total.toFixed(2);
  document.getElementById('t-krw').textContent='₩'+Math.round(total*rate).toLocaleString();
}

function save(){
  const docno=document.getElementById('n-docno').value.trim();
  const company=document.getElementById('n-company').value.trim();
  const date=document.getElementById('n-date').value;
  if(!docno||!company||!date){alert('문서번호, 고객사명, 날짜는 필수입니다.');return;}
  const rate=+document.getElementById('n-rate').value||1500.65;
  const fr=+document.getElementById('n-freight').value||0;
  const ins=+document.getElementById('n-insurance').value||0;
  const sub=rows.reduce((s,r)=>s+r.qty*r.unit,0);
  const total=sub+fr+ins;
  const krw=Math.round(total*rate);
  const vat=Math.round(krw*.1);
  quotes.unshift({
    id:Date.now(),docno,company,date,
    address:document.getElementById('n-addr').value,
    tel:document.getElementById('n-tel').value,
    fax:document.getElementById('n-fax').value,
    note:document.getElementById('n-note').value,
    rate,freight:fr,insurance:ins,
    items:rows.map(r=>({...r})),
    sub,total,krw,vat,grand:krw+vat
  });
  persist();renderAll();resetForm();goTab('list');
  toast('✓ 저장되었습니다');
}

function resetForm(){
  ['n-docno','n-company','n-addr','n-tel','n-fax','n-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-date').value='';
  document.getElementById('n-freight').value=0;
  document.getElementById('n-insurance').value=0;
  document.getElementById('n-rate').value=1500.65;
  rows=[];addRow();
}

function renderAll(){renderStats();renderFilter();render();}

function renderStats(){
  const now=new Date().toISOString().slice(0,7);
  const mc=quotes.filter(q=>q.date&&q.date.startsWith(now)).length;
  const totalEur=quotes.reduce((s,q)=>s+q.total,0);
  const cos=new Set(quotes.map(q=>q.company)).size;
  document.getElementById('stats').innerHTML=[
    ['총 견적서',quotes.length+'건'],
    ['이번 달',mc+'건'],
    ['고객사',cos+'곳'],
    ['누적 합계(EUR)','€'+totalEur.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})]
  ].map(([l,v])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-value">${v}</div></div>`).join('');
}

function renderFilter(){
  const sel=document.getElementById('s-company');
  const cur=sel.value;
  const cos=[...new Set(quotes.map(q=>q.company))].sort();
  sel.innerHTML='<option value="">전체 고객사</option>'+cos.map(c=>`<option value="${x(c)}"${c===cur?' selected':''}>${x(c)}</option>`).join('');
}

function render(){
  const q=document.getElementById('s-search').value.toLowerCase();
  const co=document.getElementById('s-company').value;
  const mo=document.getElementById('s-month').value;
  const filtered=quotes.filter(qt=>{
    if(q&&!qt.company.toLowerCase().includes(q)&&!qt.docno.toLowerCase().includes(q))return false;
    if(co&&qt.company!==co)return false;
    if(mo&&(!qt.date||!qt.date.startsWith(mo)))return false;
    return true;
  });
  const el=document.getElementById('list');
  if(!filtered.length){el.innerHTML='<div class="empty">저장된 견적서가 없습니다.<br>+ 새 견적서 탭에서 추가하세요.</div>';return;}
  el.innerHTML=filtered.map(q=>`
    <div class="qcard" onclick="detail(${q.id})">
      <div class="qhead">
        <div><div class="qdocno">${x(q.docno)}</div><div class="qcompany">${x(q.company)}</div></div>
        <div style="text-align:right;"><div class="qeur">€${q.total.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="qkrw">₩${q.krw.toLocaleString()}</div></div>
      </div>
      <div class="qmeta">
        <span>${q.date||'-'}</span>
        <span class="badge">${q.items.length}개 품목</span>
        ${q.address?`<span>${x(q.address)}</span>`:''}
      </div>
    </div>`).join('');
}

function detail(id){
  const q=quotes.find(qt=>qt.id===id);if(!q)return;
  document.getElementById('modal').innerHTML=`
    <div class="mhead">
      <div class="mtitle">${x(q.docno)} — ${x(q.company)}</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="del(${id})">삭제</button>
        <button class="btn btn-sm" onclick="closeModal()">✕ 닫기</button>
      </div>
    </div>
    <div class="minfo">
      <div class="mi"><label>발행일</label><span>${q.date||'-'}</span></div>
      <div class="mi"><label>전화</label><span>${q.tel||'-'}</span></div>
      <div class="mi"><label>환율</label><span>${q.rate} 원/EUR</span></div>
      <div class="mi" style="grid-column:1/-1;"><label>주소</label><span>${q.address||'-'}</span></div>
    </div>
    <table class="tbl" style="font-size:12px;">
      <thead><tr><th>NO</th><th>코드</th><th>품명</th><th>수량</th><th>단가(EUR)</th><th>합계(EUR)</th></tr></thead>
      <tbody>${q.items.map((it,i)=>`
        <tr>
          <td>${i+1}</td>
          <td style="font-family:monospace;font-size:11px;">${x(it.code)}</td>
          <td>${x(it.name)}</td>
          <td>${it.qty}</td>
          <td>€${it.unit.toFixed(2)}</td>
          <td style="text-align:right;font-weight:600;">€${(it.qty*it.unit).toFixed(2)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <hr class="sep">
    <div class="msummary">
      <div>품목 소계: €${q.sub.toFixed(2)}</div>
      ${q.freight?`<div>운송비: €${q.freight.toFixed(2)}</div>`:''}
      ${q.insurance?`<div>보험료: €${q.insurance.toFixed(2)}</div>`:''}
      <div>EUR 합계: €${q.total.toFixed(2)}</div>
      <div>원화 소계: ₩${q.krw.toLocaleString()}</div>
      <div>부가세(10%): ₩${q.vat.toLocaleString()}</div>
      <div class="mbig">합계(부가세 포함): ₩${q.grand.toLocaleString()}</div>
    </div>
    ${q.note?`<div class="mnote">${x(q.note)}</div>`:''}
  `;
  document.getElementById('overlay').style.display='flex';
}

function del(id){
  if(!confirm('이 견적서를 삭제하시겠습니까?'))return;
  quotes=quotes.filter(q=>q.id!==id);
  persist();renderAll();closeModal();toast('삭제되었습니다');
}
function closeModal(){document.getElementById('overlay').style.display='none';}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}

function exportCSV(){
  if(!quotes.length){alert('저장된 견적서가 없습니다.');return;}
  const heads=['문서번호','고객사','날짜','주소','전화','환율','품목수','품목소계(EUR)','EUR합계','원화소계','부가세','총합계(원화)'];
  const body=quotes.map(q=>[q.docno,q.company,q.date,q.address,q.tel,q.rate,q.items.length,q.sub.toFixed(2),q.total.toFixed(2),q.krw,q.vat,q.grand]);
  const csv=[heads,...body].map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='견적서목록_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV 파일 다운로드 중...');
}

function x(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
